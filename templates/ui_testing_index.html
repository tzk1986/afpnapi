{% raw %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Web UI 测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; background: #f3f6fb; color: #1f2937; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .header { background: #fff; padding: 20px 24px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .header h1 { font-size: 22px; color: #0f172a; }
        .header-actions { display: flex; gap: 10px; }

        .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #fff; color: #3b82f6; border: 1px solid #93c5fd; }
        .btn-secondary:hover { background: #eff6ff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .back-link { color: #6b7280; text-decoration: none; font-size: 13px; }
        .back-link:hover { color: #3b82f6; }

        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .case-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: box-shadow 0.15s; border: 1px solid #e5e7eb; }
        .case-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .case-card h3 { font-size: 15px; margin-bottom: 6px; color: #0f172a; }
        .case-card .desc { font-size: 12px; color: #6b7280; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .case-card .meta { display: flex; gap: 12px; font-size: 12px; color: #9ca3af; margin-bottom: 12px; }
        .case-card .tags { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #f3f4f6; color: #6b7280; }
        .tag.recorded { background: #dbeafe; color: #1d4ed8; }
        .case-card .actions { display: flex; gap: 8px; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state h2 { font-size: 20px; color: #6b7280; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; color: #9ca3af; margin-bottom: 24px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 12px; max-width: 900px; width: 90%; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 16px; color: #0f172a; margin: 0; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #6b7280; padding: 4px 8px; border-radius: 4px; }
        .modal-close:hover { background: #f3f4f6; color: #1f2937; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-meta { display: flex; gap: 16px; margin-bottom: 16px; font-size: 13px; color: #6b7280; }
        .modal-meta strong { color: #374151; }
        .modal-steps { width: 100%; border-collapse: collapse; font-size: 13px; }
        .modal-steps th { text-align: left; padding: 8px 10px; background: #f9fafb; border-bottom: 2px solid #e5e7eb; font-weight: 500; color: #6b7280; font-size: 12px; }
        .modal-steps td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
        .modal-steps tr:hover td { background: #f8fafc; }
        .modal-steps .action-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: monospace; }
        .action-click { background: #dbeafe; color: #1d4ed8; }
        .action-type { background: #fef3c7; color: #b45309; }
        .action-navigate { background: #e0e7ff; color: #4338ca; }
        .action-select { background: #d1fae5; color: #047857; }
        .action-submit { background: #fce7f3; color: #be185d; }
        .action-default { background: #f3f4f6; color: #374151; }

        .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 10px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 1; border: 1px solid #e5e7eb; }
        .stat-card .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: #0f172a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <a href="/" class="back-link">← 返回首页</a>
                <h1 style="margin-top: 4px;">Web UI 自动化测试</h1>
            </div>
            <div class="header-actions">
                <a href="/ui-testing/recorder" class="btn btn-primary">+ 新建录制</a>
                <button class="btn btn-secondary" onclick="importCase()">导入 JSON</button>
            </div>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="label">用例总数</div>
                <div class="value" id="statTotal">-</div>
            </div>
            <div class="stat-card">
                <div class="label">总步骤数</div>
                <div class="value" id="statSteps">-</div>
            </div>
            <div class="stat-card">
                <div class="label">最近创建</div>
                <div class="value" id="statLatest" style="font-size:14px;">-</div>
            </div>
        </div>

        <div id="caseContainer"></div>
    </div>

    <input type="file" id="importFileInput" style="display:none" accept=".json" onchange="handleImportFile(event)" />

    <!-- View Modal -->
    <div class="modal-overlay" id="viewModal" onclick="if(event.target===this)closeViewModal()">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">用例详情</h2>
                <button class="modal-close" onclick="closeViewModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        var cases = [];

        function loadCases() {
            fetch('/api/ui-testing/cases')
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    cases = result.data || [];
                    renderCases();
                    updateStats();
                })
                .catch(function(e) {
                    console.error('Failed to load cases:', e);
                });
        }

        function renderCases() {
            var container = document.getElementById('caseContainer');
            if (cases.length === 0) {
                container.innerHTML = '<div class="empty-state">' +
                    '<h2>暂无测试用例</h2>' +
                    '<p>点击「新建录制」开始录制页面操作，或导入已有的 JSON 用例文件</p>' +
                    '<a href="/ui-testing/recorder" class="btn btn-primary">+ 新建录制</a>' +
                    '</div>';
                return;
            }

            container.innerHTML = '<div class="case-grid">' + cases.map(function(c) {
                var tags = (c.tags || []).map(function(t) {
                    return '<span class="tag' + (t === 'recorded' ? ' recorded' : '') + '">' + t + '</span>';
                }).join('');
                return '<div class="case-card">' +
                    '<h3>' + escapeHtml(c.name) + '</h3>' +
                    '<div class="desc">' + escapeHtml(c.description || c.base_url || '') + '</div>' +
                    '<div class="meta">' +
                        '<span>' + (c.step_count || 0) + ' 步</span>' +
                        '<span>' + formatDate(c.created_at) + '</span>' +
                    '</div>' +
                    (tags ? '<div class="tags">' + tags + '</div>' : '') +
                    '<div class="actions">' +
                        '<a href="/ui-testing/editor/' + c.id + '" class="btn btn-sm btn-secondary">编辑</a>' +
                        '<button class="btn btn-sm btn-secondary" onclick="viewCase(\'' + c.id + '\')">查看</button>' +
                        '<button class="btn btn-sm btn-danger" onclick="deleteCase(\'' + c.id + '\', \'' + escapeHtml(c.name) + '\')">删除</button>' +
                    '</div>' +
                    '</div>';
            }).join('') + '</div>';
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = cases.length;
            var totalSteps = cases.reduce(function(sum, c) { return sum + (c.step_count || 0); }, 0);
            document.getElementById('statSteps').textContent = totalSteps;
            if (cases.length > 0) {
                document.getElementById('statLatest').textContent = formatDate(cases[0].created_at);
            }
        }

        function deleteCase(id, name) {
            if (!confirm('确认删除用例「' + name + '」？此操作不可恢复。')) return;
            fetch('/api/ui-testing/cases/' + id, { method: 'DELETE' })
                .then(function(r) { return r.json(); })
                .then(function() { loadCases(); })
                .catch(function(e) { alert('删除失败: ' + e.message); });
        }

        function viewCase(id) {
            fetch('/api/ui-testing/cases/' + id)
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    var c = result.data;
                    document.getElementById('modalTitle').textContent = c.name || '用例详情';
                    var steps = c.steps || [];
                    var html = '<div class="modal-meta">' +
                        '<span><strong>URL:</strong> ' + escapeHtml(c.base_url || '-') + '</span>' +
                        '<span><strong>步骤:</strong> ' + steps.length + '</span>' +
                        '<span><strong>创建:</strong> ' + formatDate(c.created_at) + '</span>' +
                        '</div>';

                    if (steps.length === 0) {
                        html += '<div style="text-align:center;padding:40px;color:#9ca3af;">暂无步骤</div>';
                    } else {
                        html += '<table class="modal-steps"><thead><tr>' +
                            '<th style="width:36px">#</th><th style="width:80px">操作</th><th>选择器</th>' +
                            '<th style="width:140px">值</th><th style="width:160px">描述</th>' +
                            '</tr></thead><tbody>';
                        steps.forEach(function(s, i) {
                            var sel = s.selector ? (typeof s.selector === 'string' ? s.selector : (s.selector.primary || '')) : '';
                            var desc = s.description || buildStepDescription(s);
                            html += '<tr>' +
                                '<td style="color:#9ca3af;text-align:center;">' + (i + 1) + '</td>' +
                                '<td><span class="action-badge ' + getActionClass(s.action) + '">' + (s.action || '-') + '</span></td>' +
                                '<td style="font-family:monospace;font-size:11px;color:#6b7280;word-break:break-all;max-width:250px;">' + escapeHtml(truncate(sel, 80)) + '</td>' +
                                '<td style="font-size:12px;">' + escapeHtml(truncate(s.value || '', 40)) + '</td>' +
                                '<td style="font-size:12px;color:#6b7280;">' + escapeHtml(truncate(desc, 50)) + '</td>' +
                                '</tr>';
                        });
                        html += '</tbody></table>';
                    }
                    document.getElementById('modalBody').innerHTML = html;
                    document.getElementById('viewModal').classList.add('active');
                });
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeViewModal();
        });

        function buildStepDescription(step) {
            if (!step) return '';
            var info = step.element_info || {};
            var parts = [];
            if (info.tag) parts.push(info.tag);
            if (info.text && info.text.length <= 30) parts.push('「' + info.text + '」');
            else if (info.name) parts.push('name=' + info.name);
            else if (info.placeholder) parts.push('placeholder=' + info.placeholder);
            return parts.join(' ') || step.action || '';
        }

        function getActionClass(action) {
            if (!action) return 'action-default';
            var map = { click: 'action-click', dblclick: 'action-click', type: 'action-type',
                        keypress: 'action-type', navigate: 'action-navigate',
                        select: 'action-select', check: 'action-select', uncheck: 'action-select',
                        submit: 'action-submit' };
            return map[action] || 'action-default';
        }

        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.substring(0, max) + '...' : str;
        }

        function importCase() {
            document.getElementById('importFileInput').click();
        }

        function handleImportFile(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    fetch('/api/ui-testing/cases', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(function(r) { return r.json(); })
                    .then(function() { loadCases(); })
                    .catch(function(e) { alert('导入失败: ' + e.message); });
                } catch (e) {
                    alert('JSON 解析失败: ' + e.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function formatDate(iso) {
            if (!iso) return '-';
            try {
                var d = new Date(iso);
                return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
            } catch(e) { return iso; }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        loadCases();
    </script>
</body>
</html>
{% endraw %}
