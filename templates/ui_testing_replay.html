<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用例回放 - Web UI 测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; background: #f3f6fb; color: #1f2937; height: 100vh; display: flex; flex-direction: column; }

        .top-bar { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
        .top-bar h1 { font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .top-bar .status-info { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #6b7280; }
        .top-bar .status-info .step-counter { font-weight: 600; color: #0f172a; }
        .top-bar .status-info .timer { font-family: monospace; }

        .main-content { flex: 1; display: flex; overflow: hidden; }

        .iframe-panel { flex: 1; position: relative; background: #e5e7eb; }
        .iframe-panel iframe { width: 100%; height: 100%; border: none; }
        .iframe-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); font-size: 14px; color: #6b7280; }

        .steps-panel { width: 380px; background: #fff; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; flex-shrink: 0; }
        .steps-header { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; font-size: 13px; font-weight: 500; color: #374151; }
        .steps-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .step-item { padding: 8px 16px; display: flex; align-items: flex-start; gap: 8px; font-size: 12px; border-left: 3px solid transparent; transition: all 0.15s; }
        .step-item.current { background: #eff6ff; border-left-color: #3b82f6; }
        .step-item.passed { border-left-color: #10b981; }
        .step-item.failed { border-left-color: #ef4444; background: #fef2f2; }
        .step-item.skipped { opacity: 0.5; }

        .step-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; line-height: 18px; }
        .step-icon.pending { color: #d1d5db; }
        .step-icon.running { color: #3b82f6; }
        .step-icon.passed { color: #10b981; }
        .step-icon.failed { color: #ef4444; }

        .step-content { flex: 1; min-width: 0; }
        .step-action { font-family: monospace; font-weight: 500; color: #374151; }
        .step-detail { color: #9ca3af; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .step-duration { font-family: monospace; color: #9ca3af; font-size: 11px; flex-shrink: 0; }
        .step-error { color: #ef4444; font-size: 11px; margin-top: 4px; word-break: break-all; }

        .steps-footer { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }

        .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
        .btn-secondary:hover { background: #f3f4f6; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .summary-bar { padding: 16px; background: #f9fafb; border-top: 1px solid #e5e7eb; }
        .summary-bar.passed { background: #f0fdf4; }
        .summary-bar.failed { background: #fef2f2; }
        .summary-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .summary-stats { display: flex; gap: 16px; font-size: 12px; color: #6b7280; }
        .summary-stats strong { color: #0f172a; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>
            <span id="execIcon">▶</span>
            <span id="execTitle">正在加载...</span>
            <span id="currentUrl" style="margin-left:12px;font-size:12px;color:#9ca3af;font-family:monospace;"></span>
        </h1>
        <div class="status-info">
            <span>步骤 <span class="step-counter" id="stepCounter">0/0</span></span>
            <span class="timer" id="timer">0.0s</span>
            <a href="javascript:history.back()" style="color:#6b7280;text-decoration:none;font-size:12px;">← 返回</a>
        </div>
    </div>

    <div class="main-content">
        <div class="iframe-panel">
            <iframe id="replayFrame" sandbox="allow-same-origin allow-scripts allow-modals allow-forms allow-popups allow-top-navigation allow-downloads"></iframe>
            <div class="iframe-loading" id="iframeLoading">正在加载目标页面...</div>
        </div>

        <div class="steps-panel">
            <div class="steps-header">步骤记录</div>
            <div class="steps-list" id="stepsList"></div>
            <div id="summaryArea"></div>
            <div class="steps-footer" id="controlsArea">
                <button class="btn btn-warning" id="btnPause" onclick="pauseReplay()" disabled>暂停</button>
                <button class="btn btn-danger" id="btnStop" onclick="stopReplay()">停止</button>
                <button class="btn btn-secondary" id="btnExport" onclick="exportReport()" style="display:none">查看报告</button>
            </div>
        </div>
    </div>

    <script>
        var jobId = '{{ job_id }}';
        var steps = [];
        var results = [];
        var currentStepIndex = -1;
        var isRunning = false;
        var isPaused = false;
        var replayFinished = false;
        var startTime = 0;
        var timerInterval = null;
        var pausedAt = 0;
        var totalPausedMs = 0;
        var iframeReady = false;
        var replayStarted = false;
        var networkRequests = [];
        var initialTargetOrigin = ''; // 初始目标应用的 origin，用于判断 SPA 路由变化
        var savedReplayState = null; // 跨页面导航时保存的回放状态（由引擎通过 postMessage 传来）

        var clearLoginOption = true; // 默认清除登录信息

        // 加载执行任务数据
        function loadJobData() {
            return fetch('/api/ui-testing/execution/' + jobId + '/init')
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (!result.data) {
                        document.getElementById('execTitle').textContent = '加载失败';
                        return clearLoginOption;
                    }
                    var data = result.data;
                    steps = data.steps || [];
                    networkRequests = data.network_requests || [];
                    var options = data.options || {};
                    clearLoginOption = options.clear_login !== false; // 默认 true
                    document.getElementById('execTitle').textContent = data.case_name || '用例回放';
                    document.title = '回放 - ' + (data.case_name || '');
                    renderStepsList();

                    // 加载目标页面到 iframe
                    var baseUrl = data.base_url || '';
                    if (baseUrl) {
                        // 保存初始目标应用的 origin，用于后续判断 SPA 路由变化
                        var originObj = new URL(baseUrl);
                        initialTargetOrigin = originObj.protocol + '//' + originObj.host;
                        // 从 baseUrl 提取 pathname，让 iframe 的 window.location.pathname 直接等于目标路径
                        // 这样 Vue Router 等 SPA 框架可以正确匹配路由
                        var urlObj = new URL(baseUrl);
                        var targetPath = urlObj.pathname + urlObj.search + urlObj.hash;
                        var proxyUrl = targetPath + (targetPath.indexOf('?') >= 0 ? '&' : '?') +
                            '_proxy_url=' + encodeURIComponent(baseUrl) + '&replay=1';
                        document.getElementById('replayFrame').src = proxyUrl;
                    } else {
                        document.getElementById('iframeLoading').textContent = '用例无 base_url，请导航步骤指定页面';
                    }
                })
                .catch(function(e) {
                    document.getElementById('execTitle').textContent = '加载失败: ' + e.message;
                })
                .then(function() { return clearLoginOption; });
        }

        function renderStepsList() {
            var html = steps.map(function(step, i) {
                return '<div class="step-item pending" id="step-' + i + '">' +
                    '<div class="step-icon pending" id="step-icon-' + i + '">○</div>' +
                    '<div class="step-content">' +
                        '<div class="step-action">' + (step.action || '-') + '</div>' +
                        '<div class="step-detail">' + buildStepDetail(step) + '</div>' +
                    '</div>' +
                    '<div class="step-duration" id="step-dur-' + i + '"></div>' +
                    '</div>';
            }).join('');
            document.getElementById('stepsList').innerHTML = html;
            document.getElementById('stepCounter').textContent = '0/' + steps.length;
        }

        function buildStepDetail(step) {
            if (step.action === 'navigate') return truncate(step.value || '', 60);
            if (step.action === 'wait') return (step.value || '1000') + 'ms';
            var sel = '';
            if (step.selector) {
                if (typeof step.selector === 'string') sel = step.selector;
                else sel = step.selector.primary || '';
            }
            var info = step.element_info || {};
            var parts = [];
            if (sel) parts.push(truncate(sel, 30));
            if (info.text && info.text.length <= 20) parts.push('「' + info.text + '」');
            if (step.value && step.action === 'type') parts.push('→ ' + truncate(step.value, 20));
            return parts.join(' ') || '-';
        }

        // iframe 加载完成
        document.getElementById('replayFrame').addEventListener('load', function() {
            document.getElementById('iframeLoading').style.display = 'none';
            iframeReady = true;
            injectReplayEngine();
        });

        // 监听来自 iframe 的 postMessage
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            var type = e.data.type;
            var data = e.data.data || {};

            switch (type) {
                case 'ui-replay-ready':
                    // 引擎就绪，自动开始
                    if (!replayStarted && steps.length > 0) {
                        replayStarted = true;
                        // 如果之前已经在运行（跨页面导航），保留计时器
                        startReplay(isRunning);
                    }
                    break;
                case 'ui-replay-step_start':
                    onStepStart(data.index, data.total);
                    break;
                case 'ui-replay-step_complete':
                    onStepComplete(data);
                    break;
                case 'ui-replay-all_complete':
                    onAllComplete(data);
                    break;
                case 'ui-replay-navigate':
                    onNavigate(data);
                    break;
                case 'ui-replay-save-state':
                    savedReplayState = data;
                    console.log('[Parent] Replay state saved from engine, currentIndex:', data.currentIndex);
                    break;
                case 'ui-replay-screenshot':
                    captureScreenshot(data.step_index);
                    break;
                case 'ui-replay-paused':
                    isPaused = true;
                    updateControlButtons();
                    break;
                case 'ui-replay-stopped':
                    isRunning = false;
                    replayFinished = true;
                    stopTimer();
                    document.getElementById('btnExport').style.display = 'inline-block';
                    var stoppedSummary = '<div class="summary-bar failed">' +
                        '<div class="summary-title">已手动停止</div>' +
                        '<div class="summary-stats">' +
                            '<span>已执行: <strong>' + (data.index + 1) + '</strong> 步</span>' +
                            '<span>耗时: <strong>' + (getElapsedMs() / 1000).toFixed(1) + 's</strong></span>' +
                        '</div></div>';
                    document.getElementById('summaryArea').innerHTML = stoppedSummary;
                    updateControlButtons();
                    break;
                case '_proxy_nav':
                    var navLabel = data.method ? ('[' + data.method + ']') : (data.event ? '[' + data.event + ']' : '[href]');
                    console.log('[ProxyNav]', navLabel, data);
                    fetch('/api/ui-testing/replay-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            job_id: jobId,
                            step_index: currentStepIndex,
                            event: 'proxy_nav',
                            message: navLabel + ' ' + (data.href || data.pathname || '') + ' from ' + (data.loc || ''),
                            detail: data,
                            level: 'info'
                        })
                    }).catch(function() {});
                    // window.open 在回放模式下需要导航到目标系统
                    if (data.method === 'window.open' && data.target && initialTargetOrigin) {
                        console.log('[ProxyNav] window.open detected, navigating to target system');
                        var targetUrl = data.target;
                        var replayUrl = '/ui-testing/proxy?url=' + encodeURIComponent(targetUrl) + '&replay=1';
                        document.getElementById('replayFrame').src = replayUrl;
                    }
                    break;
            }
        });

        function startReplay(resumeFromPrevious) {
            isRunning = true;
            if (!resumeFromPrevious) {
                startTime = Date.now();
            }
            startTimer();
            updateControlButtons();
            var initMsg = { type: 'ui-replay-control', action: 'init', steps: steps, options: { delay_between_steps: 500, timeout: 5000, job_id: jobId, network_requests: networkRequests } };
            if (savedReplayState) {
                initMsg.savedState = savedReplayState;
                console.log('[Parent] Passing saved replay state to engine, currentIndex:', savedReplayState.currentIndex);
                savedReplayState = null; // 用完即清，避免后续 SPA 路由误用
            }
            sendToFrame(initMsg);
            setTimeout(function() {
                sendToFrame({ type: 'ui-replay-control', action: 'start' });
            }, 100);
        }

        function getElapsedMs() {
            var paused = totalPausedMs;
            if (pausedAt > 0) paused += Date.now() - pausedAt;
            return Date.now() - startTime - paused;
        }

        function pauseReplay() {
            if (isPaused) {
                if (pausedAt > 0) {
                    totalPausedMs += Date.now() - pausedAt;
                    pausedAt = 0;
                }
                sendToFrame({ type: 'ui-replay-control', action: 'resume' });
                isPaused = false;
            } else {
                pausedAt = Date.now();
                sendToFrame({ type: 'ui-replay-control', action: 'pause' });
                isPaused = true;
            }
            updateControlButtons();
        }

        function stopReplay() {
            if (replayFinished) return;
            isRunning = false;
            replayFinished = true;
            stopTimer();
            updateControlButtons();

            // 方式1: 直接在 iframe 窗口上设置停止标志（同源，最可靠）
            var frame = document.getElementById('replayFrame');
            try {
                if (frame.contentWindow) {
                    frame.contentWindow.__REPLAY_STOP__ = true;
                    console.log('[Parent] Set __REPLAY_STOP__ flag');
                }
            } catch(e) { console.error('Failed to set stop flag:', e); }

            // 方式2: postMessage（异步，作为备用）
            sendToFrame({ type: 'ui-replay-control', action: 'stop' });

            // 方式3: 通知后端取消任务
            fetch('/api/ui-testing/execution/' + jobId + '/cancel', { method: 'POST' })
                .then(function(r) { return r.json(); })
                .catch(function(e) { console.error('取消任务失败:', e); });

            // 兜底：如果引擎未运行（不会收到 ui-replay-stopped 消息），直接显示汇总
            document.getElementById('btnExport').style.display = 'inline-block';
            var elapsed = startTime ? (getElapsedMs() / 1000).toFixed(1) : '0.0';
            var stoppedSummary = '<div class="summary-bar failed">' +
                '<div class="summary-title">已手动停止</div>' +
                '<div class="summary-stats">' +
                    '<span>耗时: <strong>' + elapsed + 's</strong></span>' +
                '</div></div>';
            document.getElementById('summaryArea').innerHTML = stoppedSummary;
        }

        function sendToFrame(msg) {
            var frame = document.getElementById('replayFrame');
            try {
                if (frame.contentWindow) frame.contentWindow.postMessage(msg, '*');
            } catch(e) { console.error('postMessage failed:', e); }
        }

        function onStepStart(index, total) {
            currentStepIndex = index;
            document.getElementById('stepCounter').textContent = (index + 1) + '/' + total;
            var el = document.getElementById('step-' + index);
            if (el) {
                el.className = 'step-item current';
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            var icon = document.getElementById('step-icon-' + index);
            if (icon) { icon.className = 'step-icon running'; icon.innerHTML = '<span class="spinner"></span>'; }
        }

        function onStepComplete(data) {
            var index = data.index;
            var el = document.getElementById('step-' + index);
            if (el) el.className = 'step-item ' + (data.status || 'passed');
            var icon = document.getElementById('step-icon-' + index);
            if (icon) {
                icon.className = 'step-icon ' + (data.status || 'passed');
                icon.textContent = data.status === 'passed' ? '✓' : '✗';
            }
            var dur = document.getElementById('step-dur-' + index);
            if (dur) dur.textContent = ((data.duration_ms || 0) / 1000).toFixed(1) + 's';

            // 如果步骤失败，显示错误
            if (data.status !== 'passed' && data.error) {
                var content = el ? el.querySelector('.step-content') : null;
                if (content) {
                    var errDiv = document.createElement('div');
                    errDiv.className = 'step-error';
                    errDiv.textContent = data.error;
                    content.appendChild(errDiv);
                }
            }

            // 上报步骤结果到后端
            fetch('/api/ui-testing/execution/' + jobId + '/step', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step_result: data })
            }).catch(function() {});
        }

        function onAllComplete(data) {
            isRunning = false;
            replayFinished = true;
            stopTimer();
            document.getElementById('execIcon').textContent = data.status === 'passed' ? '✓' : '✗';

            // 上报完成到后端
            fetch('/api/ui-testing/execution/' + jobId + '/finalize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    status: data.status,
                    summary: {
                        total_duration_ms: getElapsedMs(),
                        steps_total: data.total_steps,
                        steps_passed: data.passed,
                        steps_failed: data.failed
                    }
                })
            }).catch(function() {});

            // 显示汇总
            var statusTitle = data.status === 'passed' ? '全部通过' : '执行失败';
            var summaryHtml = '<div class="summary-bar ' + data.status + '">' +
                '<div class="summary-title">' + statusTitle + '</div>' +
                '<div class="summary-stats">' +
                    '<span>总步骤: <strong>' + data.total_steps + '</strong></span>' +
                    '<span>通过: <strong style="color:#10b981">' + data.passed + '</strong></span>' +
                    '<span>失败: <strong style="color:#ef4444">' + data.failed + '</strong></span>' +
                    '<span>耗时: <strong>' + (getElapsedMs() / 1000).toFixed(1) + 's</strong></span>' +
                '</div>' +
                '</div>';
            document.getElementById('summaryArea').innerHTML = summaryHtml;
            document.getElementById('btnExport').style.display = 'inline-block';
            updateControlButtons();
        }

        function onNavigate(navData) {
            var url = (typeof navData === 'string') ? navData : (navData.url || '');
            var isNewTab = (typeof navData === 'object' && navData.new_tab) || false;
            if (!url) return;
            console.log('[onNavigate] url=', url, 'new_tab=', isNewTab);

            var urlObj = new URL(url, window.location.origin);
            var currentUrl = document.getElementById('currentUrl');
            if (currentUrl) currentUrl.textContent = urlObj.pathname + urlObj.search;

            var shouldNavigate = false;
            var proxyUrl = '';

            // 判断1：URL 中包含 _proxy_url 参数（代理 pushState 后的形式）
            if (url.indexOf('_proxy_url=') > 0 || url.indexOf('_proxy_url%3D') > 0) {
                // 从 _proxy_url 参数中提取原始 target origin
                var proxyUrlParam = '';
                try {
                    var searchStr = urlObj.search;
                    var idx = searchStr.indexOf('_proxy_url=');
                    if (idx >= 0) {
                        proxyUrlParam = decodeURIComponent(searchStr.substring(idx + 11).split('&')[0]);
                    }
                } catch(e) {}
                if (proxyUrlParam) {
                    try {
                        var targetOriginObj = new URL(proxyUrlParam);
                        var targetOrigin = targetOriginObj.protocol + '//' + targetOriginObj.host;
                        if (initialTargetOrigin && targetOrigin === initialTargetOrigin) {
                            // 同origin，只是 SPA 路由变化，不刷新 iframe
                            console.log('[onNavigate] 同origin SPA路由变化（含_proxy_url），不刷新 iframe');
                            shouldNavigate = false;
                        } else if (!initialTargetOrigin) {
                            // initialTargetOrigin 未设置，保守处理：不刷新
                            console.log('[onNavigate] initialTargetOrigin 未设置，保守处理不刷新');
                            shouldNavigate = false;
                        } else {
                            // 不同origin，真正的外部URL导航
                            shouldNavigate = true;
                            // 如果 _proxy_url 指向代理服务器自身（pushState 残留），使用 initialTargetOrigin 修正
                            if (targetOrigin === window.location.origin && initialTargetOrigin) {
                                var correctedOrigin = initialTargetOrigin;
                                var proxyPath = '';
                                try { proxyPath = targetOriginObj.pathname + (targetOriginObj.search || '') + (targetOriginObj.hash || ''); } catch(e2) {}
                                var correctedUrl = correctedOrigin + proxyPath;
                                var correctedPath = proxyPath || urlObj.pathname;
                                console.log('[onNavigate] _proxy_url指向代理服务器，修正为initialTargetOrigin:', correctedUrl.substring(0, 80));
                                proxyUrl = correctedPath + (correctedPath.indexOf('?') >= 0 ? '&' : '?') +
                                    '_proxy_url=' + encodeURIComponent(correctedUrl) + '&replay=1';
                            } else {
                                console.log('[onNavigate] 跨origin导航（含_proxy_url）');
                                var targetPath = urlObj.pathname + urlObj.search + urlObj.hash;
                                proxyUrl = targetPath + (targetPath.indexOf('?') >= 0 ? '&' : '?') + 'replay=1';
                            }
                        }
                    } catch(e) {
                        console.warn('[onNavigate] 解析_proxy_url失败:', e);
                    }
                }
            }
            // 判断2：代理 URL（包含 /ui-testing/proxy 路径但不含 _proxy_url）
            else if (url.indexOf('/ui-testing/proxy') >= 0) {
                // SPA 局部更新，不刷新 iframe
            }
            // 判断3：完整URL — 区分同origin SPA路由 vs 真正跨origin导航
            else if (url.indexOf('http://') === 0 || url.indexOf('https://') === 0) {
                var navOrigin = urlObj.protocol + '//' + urlObj.host;
                if (isNewTab) {
                    // new_tab 直接走 /ui-testing/proxy 端点，确保使用正确的 session
                    shouldNavigate = true;
                    proxyUrl = '/ui-testing/proxy?url=' + encodeURIComponent(url) + '&replay=1';
                    console.log('[onNavigate] new_tab 走 proxy 端点，url=', url.substring(0, 80));
                } else if (initialTargetOrigin && navOrigin === initialTargetOrigin) {
                    console.log('[onNavigate] 同origin SPA路由变化，不刷新 iframe');
                } else {
                    shouldNavigate = true;
                    var targetPath = urlObj.pathname + urlObj.search + urlObj.hash;
                    // 如果 URL 来自代理服务器（pushState 残留），使用 initialTargetOrigin 构造正确的 _proxy_url
                    var effectiveOrigin = (navOrigin === window.location.origin && initialTargetOrigin) ? initialTargetOrigin : navOrigin;
                    console.log('[onNavigate] 跨origin导航，构造代理URL, effectiveOrigin=', effectiveOrigin.substring(0, 40));
                    proxyUrl = targetPath + (targetPath.indexOf('?') >= 0 ? '&' : '?') +
                        '_proxy_url=' + encodeURIComponent(effectiveOrigin) + '&replay=1';
                }
            }

            // new_tab 兜底：如果以上条件都没匹配到，强制走 proxy 端点
            if (isNewTab && !shouldNavigate && !proxyUrl) {
                shouldNavigate = true;
                proxyUrl = '/ui-testing/proxy?url=' + encodeURIComponent(url) + '&replay=1';
                console.log('[onNavigate] new_tab 兜底走 proxy 端点, url=', url.substring(0, 80));
            }

            console.log('[onNavigate] shouldNavigate=', shouldNavigate, 'proxyUrl=', proxyUrl);

            if (shouldNavigate) {
                document.getElementById('iframeLoading').style.display = 'flex';
                document.getElementById('iframeLoading').textContent = '正在导航到: ' + url;
                document.getElementById('replayFrame').src = proxyUrl;
                replayStarted = false;
            }
        }

        function captureScreenshot(stepIndex) {
            var frame = document.getElementById('replayFrame');
            if (!frame || !frame.contentDocument) return;
            try {
                var html = frame.contentDocument.documentElement.outerHTML;
                fetch('/api/ui-testing/execution/' + jobId + '/screenshot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        step_index: stepIndex,
                        html: html,
                        page_url: frame.contentWindow.location.href
                    })
                }).catch(function() {});
            } catch(e) {
                console.warn('Screenshot capture failed:', e);
            }
        }

        function updateControlButtons() {
            document.getElementById('btnPause').disabled = !isRunning || replayFinished;
            document.getElementById('btnPause').textContent = isPaused ? '继续' : '暂停';
            document.getElementById('btnStop').disabled = replayFinished;
        }

        function exportReport() {
            window.open('/ui-testing/execution/' + jobId + '/report', '_blank');
        }

        // 计时器
        function startTimer() {
            timerInterval = setInterval(function() {
                if (!isRunning) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    return;
                }
                var elapsed = getElapsedMs() / 1000;
                document.getElementById('timer').textContent = elapsed.toFixed(1) + 's';
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.substring(0, max) + '...' : str;
        }

        // 回放引擎 JS（内联，由服务端注入的简化版 — 此处仅做 fallback）
        function getReplayerJs() {
            // 实际引擎由后端 api_ui_testing_execution_init 返回后通过 script 注入
            // 这里返回空，真正的引擎通过 API 获取
            return '';
        }

        // 改为通过 API 获取回放引擎 JS 并注入
        function injectReplayEngine() {
            fetch('/api/ui-testing/replay-engine-js?t=' + Date.now())
                .then(function(r) { return r.text(); })
                .then(function(js) {
                    var frame = document.getElementById('replayFrame');
                    try {
                        var doc = frame.contentDocument || frame.contentWindow.document;
                        var script = doc.createElement('script');
                        script.textContent = js;
                        doc.head.appendChild(script);
                    } catch(e) {
                        console.error('Failed to inject replay engine:', e);
                    }
                })
                .catch(function(e) {
                    console.error('Failed to fetch replay engine JS:', e);
                });
        }

        // 回放开始前清除所有 cookie 和 storage，确保初始状态干净（仅当 clear_login 为 true 时）
        function clearAllBeforeReplay(clearLogin) {
            if (!clearLogin) {
                console.log('[Replay] 保留登录信息，跳过清除');
                return;
            }
            try {
                // 清除当前域的所有 cookie
                document.cookie.split(';').forEach(function(c) {
                    var name = c.replace(/^\s+/, '').replace(/=.*/, '');
                    document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                });
                // 清除 storage
                localStorage.clear();
                sessionStorage.clear();
                console.log('[Replay] Cleared all cookies and storage before replay');
            } catch(e) {
                console.warn('[Replay] Failed to clear before replay:', e);
            }
        }

        // 启动：加载数据后根据 clear_login 选项决定是否清除
        loadJobData().then(function(clearLogin) {
            clearAllBeforeReplay(clearLogin);
        });
    </script>
</body>
</html>
