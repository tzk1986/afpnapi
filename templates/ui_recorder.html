<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI 录制器 - API Test Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .back-link {
      font-size: 13px;
      color: #6b7280;
      text-decoration: none;
    }
    .header .back-link:hover { color: #3b82f6; }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .panel {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .session-list { max-height: 600px; overflow-y: auto; }
    .session-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: background 0.15s;
    }
    .session-item:hover { background: #f9fafb; }
    .session-item.active { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .session-item .session-id {
      font-size: 12px;
      font-family: monospace;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .session-item .session-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .session-item .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .status.recording { background: #fef2f2; color: #ef4444; }
    .status.completed { background: #f0fdf4; color: #16a34a; }
    .step-count { color: #6b7280; }

    .detail-panel { min-height: 400px; }
    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #9ca3af;
      font-size: 14px;
    }
    .detail-content { padding: 16px; }
    .detail-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .meta-card {
      background: #f9fafb;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .meta-card .label { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
    .meta-card .value { font-size: 16px; font-weight: 600; }

    .steps-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .steps-table th {
      text-align: left;
      padding: 8px 10px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 500;
      color: #6b7280;
      font-size: 12px;
    }
    .steps-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: top;
    }
    .steps-table tr:hover td { background: #f9fafb; }
    .action-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      font-family: monospace;
    }
    .action-click { background: #dbeafe; color: #1d4ed8; }
    .action-type { background: #fef3c7; color: #b45309; }
    .action-navigate { background: #e0e7ff; color: #4338ca; }
    .action-select { background: #d1fae5; color: #047857; }
    .action-submit { background: #fce7f3; color: #be185d; }
    .action-default { background: #f3f4f6; color: #374151; }

    .selector-text {
      font-family: monospace;
      font-size: 11px;
      color: #6b7280;
      word-break: break-all;
      max-width: 300px;
    }
    .value-text {
      font-family: monospace;
      font-size: 12px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #f9fafb; border-color: #9ca3af; }
    .btn-primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn-danger:hover { background: #dc2626; }

    .empty-sessions {
      text-align: center;
      padding: 40px 16px;
      color: #9ca3af;
    }
    .refresh-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      margin-right: 6px;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .info-banner {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #1e40af;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>UI 录制器</h1>
    <a href="/" class="back-link">← 返回首页</a>
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-header">
        <span><span class="refresh-indicator"></span>录制会话</span>
        <button class="btn" onclick="refreshSessions()" style="padding:4px 10px;font-size:12px;">刷新</button>
      </div>
      <div class="session-list" id="sessionList">
        <div class="empty-sessions">暂无录制会话<br><br><small>安装 Chrome 扩展后开始录制</small></div>
      </div>
    </div>

    <div class="panel detail-panel">
      <div class="panel-header">会话详情</div>
      <div id="detailContent">
        <div class="detail-empty">选择左侧会话查看详情</div>
      </div>
    </div>
  </div>

  <script>
    let currentSessionId = null;
    let refreshTimer = null;

    async function refreshSessions() {
      try {
        const resp = await fetch('/api/ui-recorder/sessions');
        const result = await resp.json();
        const sessions = result.data || [];
        renderSessionList(sessions);

        if (currentSessionId) {
          const active = sessions.find(s => s.session_id === currentSessionId);
          if (active && active.status === 'recording') {
            loadSessionDetail(currentSessionId);
          }
        }
      } catch (e) {
        console.error('Failed to refresh sessions:', e);
      }
    }

    function renderSessionList(sessions) {
      const container = document.getElementById('sessionList');
      if (!sessions.length) {
        container.innerHTML = '<div class="empty-sessions">暂无录制会话<br><br><small>安装 Chrome 扩展后开始录制</small></div>';
        return;
      }

      container.innerHTML = sessions.map(s => `
        <div class="session-item ${s.session_id === currentSessionId ? 'active' : ''}"
             onclick="loadSessionDetail('${s.session_id}')">
          <div class="session-id">${s.session_id}</div>
          <div class="session-meta">
            <span class="status ${s.status}">${s.status === 'recording' ? '录制中' : '已完成'}</span>
            <span class="step-count">${s.total_steps} 步</span>
          </div>
          <div style="font-size:11px;color:#9ca3af;margin-top:4px;">
            ${formatTime(s.started_at)}
          </div>
        </div>
      `).join('');
    }

    async function loadSessionDetail(sessionId) {
      currentSessionId = sessionId;
      try {
        const resp = await fetch('/api/ui-recorder/session/' + sessionId);
        const result = await resp.json();
        const session = result.data;
        renderDetail(session);

        if (session.status === 'recording') {
          startAutoRefresh();
        } else {
          stopAutoRefresh();
        }
      } catch (e) {
        console.error('Failed to load session:', e);
      }
      refreshSessions();
    }

    function renderDetail(session) {
      const container = document.getElementById('detailContent');
      const allSteps = [...(session.steps || [])];

      container.innerHTML = `
        <div class="detail-content">
          <div class="detail-meta">
            <div class="meta-card">
              <div class="label">状态</div>
              <div class="value" style="color:${session.status === 'recording' ? '#ef4444' : '#16a34a'}">
                ${session.status === 'recording' ? '● 录制中' : '✓ 已完成'}
              </div>
            </div>
            <div class="meta-card">
              <div class="label">步骤数</div>
              <div class="value">${allSteps.length}</div>
            </div>
            <div class="meta-card">
              <div class="label">开始时间</div>
              <div class="value" style="font-size:13px;">${formatTime(session.started_at)}</div>
            </div>
          </div>

          <div class="toolbar">
            <button class="btn btn-primary" onclick="exportSession('${session.session_id}')">导出 JSON</button>
            <button class="btn btn-danger" onclick="deleteSession('${session.session_id}')">删除</button>
          </div>

          ${allSteps.length > 0 ? renderStepsTable(allSteps) : '<div class="detail-empty">暂无步骤数据</div>'}
        </div>
      `;
    }

    function renderStepsTable(steps) {
      return `
        <table class="steps-table">
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th style="width:80px">操作</th>
              <th>选择器</th>
              <th style="width:150px">值</th>
              <th style="width:180px">页面</th>
            </tr>
          </thead>
          <tbody>
            ${steps.map((step, i) => `
              <tr>
                <td>${i + 1}</td>
                <td><span class="action-badge ${getActionClass(step.action)}">${step.action || '-'}</span></td>
                <td class="selector-text" title="${escapeHtml(getSelectorPrimary(step.selector))}">${escapeHtml(truncate(getSelectorPrimary(step.selector), 60))}</td>
                <td class="value-text" title="${escapeHtml(step.value || '')}">${escapeHtml(truncate(step.value || '', 30))}</td>
                <td style="font-size:11px;color:#9ca3af;" title="${escapeHtml(step.page_url || '')}">${escapeHtml(truncate(extractDomain(step.page_url), 25))}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function getSelectorPrimary(sel) {
      if (!sel) return '-';
      if (typeof sel === 'string') return sel;
      return sel.primary || sel.fallback_css || sel.fallback_xpath || '-';
    }

    function getActionClass(action) {
      if (!action) return 'action-default';
      const map = { click: 'action-click', dblclick: 'action-click', type: 'action-type',
                    keypress: 'action-type', navigate: 'action-navigate', new_tab: 'action-navigate',
                    select: 'action-select', check: 'action-select', uncheck: 'action-select',
                    submit: 'action-submit' };
      return map[action] || 'action-default';
    }

    async function exportSession(sessionId) {
      window.open('/api/ui-recorder/session/' + sessionId + '/export', '_blank');
    }

    async function deleteSession(sessionId) {
      if (!confirm('确认删除此录制会话？')) return;
      try {
        await fetch('/api/ui-recorder/session/' + sessionId, { method: 'DELETE' });
        if (currentSessionId === sessionId) {
          currentSessionId = null;
          document.getElementById('detailContent').innerHTML = '<div class="detail-empty">选择左侧会话查看详情</div>';
        }
        refreshSessions();
      } catch (e) {
        alert('删除失败');
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(() => {
        if (currentSessionId) loadSessionDetail(currentSessionId);
      }, 2000);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    function formatTime(isoStr) {
      if (!isoStr) return '-';
      try {
        const d = new Date(isoStr);
        return d.toLocaleString('zh-CN');
      } catch { return isoStr; }
    }

    function truncate(str, max) {
      if (!str) return '';
      return str.length > max ? str.substring(0, max) + '...' : str;
    }

    function extractDomain(url) {
      if (!url) return '-';
      try { return new URL(url).hostname; } catch { return url; }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    refreshSessions();
    setInterval(refreshSessions, 5000);
  </script>
</body>
</html>
