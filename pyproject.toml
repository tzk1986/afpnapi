[tool.mypy]
python_version = "3.10"
files = [
	"postman_api_tester/auth.py",
	"postman_api_tester/executor.py",
	"postman_api_tester/parser.py",
	"postman_api_tester/postman_api_tester.py",
	"postman_api_tester/report_repository.py",
	"postman_api_tester/report_server.py",
	"postman_api_tester/services/report_delete_service.py",
	"postman_api_tester/services/report_judgement_service.py",
	"postman_api_tester/services/report_patch_service.py",
	"postman_api_tester/handlers/manual_case_handler.py",
	"postman_api_tester/handlers/report_handler.py",
	"postman_api_tester/run_test_and_open.py",
]
ignore_missing_imports = true
follow_imports = "skip"
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
disable_error_code = ["import-untyped"]
pretty = true
show_error_codes = true
